<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fogmirror</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital@0;1&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <div id="app">

    <!-- splash screen -->
    <div id="splash">
      <div class="splash-inner">
        <p class="eyebrow">// fogmirror.exe</p>
        <h1>breathe on me</h1>
        <p class="sub">open your mouth to fog the mirror.<br>point your finger to write on it.</p>
        <button id="start-btn">[ initialize ]</button>
        <div class="hints">
          <span>😮 open mouth → fog</span>
          <span>☝️ index finger → draw</span>
          <span>🎙️ say <em>"wipe"</em> or <em>"clear"</em></span>
        </div>
      </div>
    </div>

    <!-- mirror stage -->
    <div id="stage" class="hidden">

      <video id="mirror-video" autoplay playsinline muted></video>

      <!-- fog particle canvas -->
      <canvas id="fog-canvas"></canvas>

      <!-- drawing canvas (topmost) -->
      <canvas id="draw-canvas"></canvas>

      <!-- hud overlay -->
      <div id="hud">
        <span id="status-mode"></span>
        <span id="status-voice"></span>
      </div>

      <!-- toolbar -->
      <div id="toolbar">
        <button class="tool-btn" id="btn-wipe">🌫️ wipe</button>
        <button class="tool-btn" id="btn-clear">✏️ clear</button>
        <input type="color" id="pen-color" value="#ffffff" title="pen color" />
        <input type="range" id="pen-size" min="2" max="30" value="8" title="pen size" />
        <button class="tool-btn" id="btn-save">📷 save</button>
      </div>

    </div>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
