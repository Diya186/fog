<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fogmirror</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">

    <div id="splash">

      <!-- floating fog orbs (CSS only) -->
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="orb orb-4"></div>
      <div class="orb orb-5"></div>

      <!-- floating particles -->
      <div class="particles">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>

      <div class="splash-inner">

        <p class="eyebrow">// fogmirror.exe</p>

        <div class="title-wrap">
          <h1 class="title-line">breathe</h1>
          <h1 class="title-line accent">on me</h1>
        </div>

        <p class="sub">
          a mirror that remembers your breath<br>
          <em>and forgets everything else</em>
        </p>

        <button id="start-btn">
          <span class="btn-text">[ initialize ]</span>
          <span class="btn-glow"></span>
        </button>

        <div class="hints">
          <div class="hint-pill">
            <span class="hint-icon">😮</span>
            <span>open mouth<br><em>fog appears</em></span>
          </div>
          <div class="hint-divider">·</div>
          <div class="hint-pill">
            <span class="hint-icon">☝️</span>
            <span>point finger<br><em>write on fog</em></span>
          </div>
          <div class="hint-divider">·</div>
          <div class="hint-pill">
            <span class="hint-icon">🎙️</span>
            <span>say "wipe"<br><em>start over</em></span>
          </div>
        </div>

      </div>
    </div>

    <div id="stage" class="hidden">
      <video id="mirror-video" autoplay playsinline muted></video>
      <canvas id="fog-canvas"></canvas>

      <div id="hud">
        <span id="status-mode"></span>
        <span id="status-voice"></span>
      </div>

      <div id="toolbar">
        <button class="tool-btn" id="btn-wipe">🌫️ wipe</button>
        <button class="tool-btn" id="btn-clear">✏️ clear</button>
        <input type="range" id="pen-size" min="10" max="60" value="28" title="erase width" />
        <button class="tool-btn" id="btn-save">📷 save</button>
      </div>
    </div>

  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
